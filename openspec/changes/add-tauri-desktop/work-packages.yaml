# Work Packages: Tauri v2 Desktop Shell
# Decomposition for multi-agent parallel implementation
#
# DAG:
#   wp-tauri-scaffold ──── wp-platform ──┐
#                                        ├── wp-tray-shortcut ──┐
#                                        │                      ├── wp-integration
#   wp-drag-drop ──────────────────────→─┤                      │
#   wp-notifications ──────────────────→─┘                      │
#   wp-ci ──────────────────────────────────────────────────────→┘
#
# Parallel implementation note:
# add-capacitor-mobile runs concurrently. Shared resources:
#   - web/src/lib/platform.ts (both CREATE)
#   - web/package.json (both ADD deps)
# Coordinator merge queue handles ordering via lock keys.

change_id: add-tauri-desktop
generated: "2026-03-27"
plan_revision: 2

packages:
  # ─────────────────────────────────────────────
  # Layer 0: Foundation (no dependencies)
  # ─────────────────────────────────────────────

