# DAG Visualization
#
#   wp-tauri-scaffold ── wp-platform ──┐
#                                      ├── wp-tray-shortcut ──┐
#   wp-drag-drop ──────────────────────┤                      ├── wp-integration
#   wp-notifications ──────────────────┘                      │
#   wp-ci ────────────────────────────────────────────────────→┘
#
# Parallel execution groups:
#   Round 1: wp-tauri-scaffold, wp-drag-drop, wp-notifications, wp-ci (4 agents)
#   Round 2: wp-platform (1 agent, depends on scaffold)
#   Round 3: wp-tray-shortcut (1 agent, depends on platform)
#   Round 4: wp-integration (1 agent, depends on all)
#
# Critical path: wp-tauri-scaffold → wp-platform → wp-tray-shortcut → wp-integration
# Estimated parallel speedup: ~2x (4 foundation packages run simultaneously)
#
# Cross-feature conflicts with add-capacitor-mobile:
#   - web/src/lib/platform.ts — both features CREATE this file
#   - web/package.json — both features ADD dependencies
#   Resolution: Coordinator merge queue determines order.
#   Lock keys "frontend:platform:detection" declared by both features.
