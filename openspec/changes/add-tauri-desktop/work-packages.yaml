      NEW FILES: DropZone.tsx, use-tauri-file-drop.ts, file-drop.ts

      file-drop.ts:
      - Listen to tauri://file-drop and tauri://file-drop-hover events
      - Validate file extension against supported formats
      - Validate file size against MAX_UPLOAD_SIZE_MB (default 500MB)
