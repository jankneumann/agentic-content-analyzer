        - "web/src/hooks/use-platform.ts"
      keys:
        - "frontend:platform:detection"
        - "frontend:platform:hook"
      ttl_minutes: 90
      reason: "Platform detection (shared resource with add-capacitor-mobile)"
    verification:
      tier: C
      checks:
        - "cd web && pnpm exec tsc --noEmit"
    description: |
      NEW FILES: platform.ts, use-platform.ts
      MODIFIED: package.json (add tauri:dev, tauri:build scripts)

      platform.ts:
      - isTauri(): detect window.__TAURI_INTERNALS__
      - Platform type: 'desktop' | 'web' (Capacitor adds 'ios' | 'android' later)
      - getPlatform(): returns correct platform string
      - NO Capacitor references (would throw ReferenceError)

      use-platform.ts:
      - React hook wrapping getPlatform() for component use

      PARALLEL CONFLICT: add-capacitor-mobile also creates platform.ts.
      Coordinator merge queue determines which merges first.
      Second feature rebases and extends.

