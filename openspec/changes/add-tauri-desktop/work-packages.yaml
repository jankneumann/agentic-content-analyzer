      use-tauri-file-drop.ts hook:
      - Wraps file-drop.ts for React
      - Manages upload state (uploading, completed, failed)
      - Calls POST /api/v1/documents/upload for valid files

      DropZone.tsx:
      - Visual overlay when files dragged over window
      - Success/error toasts via sonner
      - Summary notification for multi-file drops

