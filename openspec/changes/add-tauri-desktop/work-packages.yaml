    description: |
      NEW FILES: notifications.ts, use-desktop-notifications.ts

      notifications.ts:
      - SSE client subscribing to GET /api/v1/notifications/stream
      - Graceful degradation: if non-200 or connection refused, log warning
        and disable notifications (no user-facing error)
      - Convert SSE events to Tauri native notifications
      - Handle notification click: show/focus window, navigate to payload.url
      - SSE reconnection with Last-Event-ID header

      use-desktop-notifications.ts hook:
      - Initialize on mount (only when isTauri())
      - Request OS notification permission on first launch
      - Manage connection state

