        - "contracts/**"
      deny:
        - "src/**"
        - "web/src/components/**"
    locks:
      files:
        - "web/src/lib/voice/on-device-stt-engine.ts"
        - "web/src/lib/voice/auto-stt-engine.ts"
      keys:
        - "frontend:voice:on-device-engine"
        - "frontend:voice:auto-engine-registration"
      ttl_minutes: 90
      reason: "OnDeviceSTTEngine class and AutoSTTEngine registration"
    verification:
      tier: C
      checks:
        - "cd web && pnpm exec tsc --noEmit"
    description: |
      NEW FILE: on-device-stt-engine.ts
      MODIFIED: auto-stt-engine.ts (register on-device), index.ts (export)

      OnDeviceSTTEngine implements STTEngine:
      - id = "on-device"
      - isAvailable(): WebAssembly support + model cached + MediaRecorder
      - start(): AudioRecorder.startRecording() → set state "listening"
      - stop(): AudioRecorder.stopRecording() → send to Worker →
                emit TranscriptEvent(cleaned=false) → set state "idle"
      - destroy(): terminate worker, release audio

      AutoSTTEngine registration:
      - Add: this.engines.set("on-device", new OnDeviceSTTEngine(config))
      - Position in constructor after existing engines

