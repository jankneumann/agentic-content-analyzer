# Work Packages: On-Device Speech-to-Text via WebAssembly
# Decomposition for multi-agent parallel implementation
#
# DAG:
#   wp-model-cache ──────┐
#   wp-audio ────────────┼── wp-engine ── wp-hook-refactor ── wp-integration
#   wp-whisper-worker ───┘       │
#   wp-settings ─────────────────┘
#   wp-settings-ui ──── wp-indicator ── wp-integration
#
# Key insight: Tasks 1.1-1.4 from the original proposal are ALREADY DONE.
# The STTEngine interface, AutoSTTEngine, BrowserSTTEngine, and CloudSTTEngine
# all exist in web/src/lib/voice/. The backend already validates "on-device"
# in VALID_ENGINE_NAMES. This plan focuses on NET NEW work only.

change_id: add-on-device-stt
generated: "2026-03-26"

packages:
  # ─────────────────────────────────────────────
  # Layer 0: Foundation (no dependencies, parallel)
  # ─────────────────────────────────────────────

  - id: wp-model-cache
    name: "Model download and cache management"
    tasks: [T3.1, T3.2, T3.3, T3.4, T3.5]
    priority: 1
    depends_on: []
    scope:
      write_allow:
        - "web/src/lib/voice/model-cache.ts"
        - "web/src/lib/voice/model-constants.ts"
      read_allow:
        - "web/src/lib/voice/**"
        - "contracts/**"
      deny:
        - "web/src/lib/voice/engine.ts"
        - "web/src/lib/voice/auto-stt-engine.ts"
        - "src/**"
    locks:
      files:
        - "web/src/lib/voice/model-cache.ts"
        - "web/src/lib/voice/model-constants.ts"
      keys:
        - "frontend:voice:model-cache"
      ttl_minutes: 90
      reason: "Cache API model management and download with progress"
    verification:
      tier: C
      checks:
        - "cd web && pnpm exec tsc --noEmit"
    description: |
      NEW FILES: model-cache.ts, model-constants.ts

      model-constants.ts: WHISPER_MODELS map with size, name, fileSize,
      memoryEstimate, cdnUrl for tiny (39MB) and base (74MB) models.

      model-cache.ts: Cache API operations
      - downloadModel(size, onProgress): fetch with ReadableStream progress
      - isModelCached(size): check Cache API for model URL
      - getCachedModel(size): retrieve ArrayBuffer from cache
      - getCachedModelInfo(): return ModelCacheStatus
      - deleteModel(size): remove from Cache API
      - Retry logic with partial download cleanup on failure

