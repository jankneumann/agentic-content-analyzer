# DAG Visualization
#
#   wp-model-cache ──────┐
#   wp-audio ────────────┼── wp-engine ── wp-indicator ──┐
#   wp-whisper-worker ───┘       │                       │
#                                │                       ├── wp-integration
#   wp-settings ─────────────────┼── wp-settings-ui ─────┘
#                                │
#
# Parallel execution groups:
#   Round 1: wp-model-cache, wp-audio, wp-whisper-worker, wp-settings (4 agents)
#   Round 2: wp-engine (1 agent, critical path)
#   Round 3: wp-settings-ui, wp-indicator (2 agents, parallel)
#   Round 4: wp-integration (1 agent)
#
# Critical path: wp-whisper-worker → wp-engine → wp-indicator → wp-integration
# Estimated parallel speedup: ~2.5x (4 foundation packages + 2 UI packages run simultaneously)
