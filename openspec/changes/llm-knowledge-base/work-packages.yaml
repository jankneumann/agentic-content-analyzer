        - "src/agents/specialists/knowledge_base.py"
        - "src/agents/specialists/research.py"
        - "tests/test_agents/test_knowledge_base_specialist.py"
        - "tests/test_mcp/test_kb_tools.py"
      read_allow:
        - "src/**"
        - "settings/**"
      deny:
        - "src/api/**"
        - "src/cli/**"
        - "web/**"
    locks:
      files:
        - "src/mcp_server.py"
        - "src/agents/specialists/knowledge_base.py"
        - "src/agents/specialists/research.py"
      keys:
        - "mcp:search_knowledge_base"
        - "mcp:get_topic"
        - "mcp:update_topic"
        - "mcp:add_topic_note"
        - "mcp:get_kb_index"
        - "mcp:compile_knowledge_base"
        - "agent:knowledge_base_specialist"
      ttl_minutes: 90
      reason: MCP and agent implementation
