      deny:
        - "src/api/**"
        - "src/agents/**"
        - "web/**"
    locks:
      files:
        - "src/cli/pipeline_commands.py"
      keys:
        - "cli:aca pipeline daily"
        - "pipeline:kb_compile_step"
      ttl_minutes: 60
      reason: Pipeline integration
    dependencies:
