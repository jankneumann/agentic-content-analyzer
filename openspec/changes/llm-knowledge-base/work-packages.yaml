    verification: Tier B

  - id: wp-integration
    name: Integration testing and validation
    description: Full test suite, cross-package validation, spec compliance
    priority: 7
    tasks: []
    scope:
      write_allow:
        - "tests/**"
      read_allow:
        - "**"
      deny: []
    locks:
      files: []
      keys: []
      ttl_minutes: 60
      reason: Integration testing
    dependencies:
      - wp-cli
      - wp-api
      - wp-agent
      - wp-pipeline
    verification: Tier A
