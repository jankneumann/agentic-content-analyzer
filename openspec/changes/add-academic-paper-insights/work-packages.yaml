    description: |
      NEW FILE: src/ingestion/reference_extractor.py
      ReferenceExtractor class: arXiv regex, DOI regex, S2 URL regex.
      extract_references() scans Content markdown_content.
      ingest_extracted_references() batch-resolves via S2 client.

  - id: wp-web-search
    name: "Scholar web search provider"
    tasks: ["8.1", "8.2", "8.3", "8.4", "8.5", "8.6"]
    priority: 3
    depends_on: [wp-client]
    scope:
      write_allow:
