# Work Packages: Academic Paper Insights via Semantic Scholar
# Decomposition for multi-agent parallel implementation
#
# DAG:
#   wp-migration ──────────┐
#   wp-client ─────────────┼── wp-ingestion ── wp-orchestrator ── wp-cli ── wp-integration
#   wp-config ─────────────┘        │
#   wp-ref-extractor ── (wp-client) ┘
#   wp-web-search ── (wp-client)
#   wp-frontend ─────────────────────────────────────────────── wp-integration
#
# Max parallel width: 4 (wp-migration, wp-client, wp-config, wp-frontend in wave 0)

change_id: add-academic-paper-insights
generated: "2026-03-28"

packages:
  # ─────────────────────────────────────────────
  # Layer 0: Foundation (no dependencies, parallel)
  # ─────────────────────────────────────────────

  - id: wp-migration
    name: "Content model & database migration"
    tasks: ["1.1", "1.2", "1.3", "1.4"]
    priority: 1
    depends_on: []
    scope:
      write_allow:
        - "src/models/content.py"
        - "alembic/versions/*scholar*.py"
      read_allow:
        - "src/models/**"
        - "alembic/**"
      deny:
        - "src/ingestion/**"
        - "src/cli/**"
        - "web/**"
    locks:
      files:
        - "src/models/content.py"
      keys:
        - "backend:models:content"
        - "backend:alembic:migration"
      ttl_minutes: 60
      reason: "Add SCHOLAR enum value and GIN index on metadata_json"
    verification:
      tier: C
      checks:
        - "python -c 'from src.models.content import ContentSource; assert ContentSource.SCHOLAR == \"scholar\"'"
    description: |
      Add SCHOLAR to ContentSource enum. Create Alembic migration with:
      - ALTER TYPE contentsource ADD VALUE IF NOT EXISTS 'scholar'
      - CREATE INDEX ix_content_metadata_json_gin ON content USING GIN (metadata_json jsonb_path_ops)
      Use op.execute() raw SQL for both (not op.create_index).

  - id: wp-client
    name: "Semantic Scholar API client"
    tasks: ["2.1", "2.2", "2.3", "2.4", "2.5", "2.6", "2.7", "2.8", "2.8a", "2.9", "2.10", "2.11"]
    priority: 1
    depends_on: []
    scope:
      write_allow:
        - "src/ingestion/semantic_scholar_client.py"
        - "tests/test_ingestion/test_semantic_scholar_client.py"
      read_allow:
        - "src/ingestion/**"
        - "src/config/settings.py"
      deny:
        - "src/models/**"
        - "src/cli/**"
        - "web/**"
    locks:
      files:
        - "src/ingestion/semantic_scholar_client.py"
      keys:
        - "backend:ingestion:scholar-client"
      ttl_minutes: 90
      reason: "S2 HTTP client with rate limiting, error handling, Pydantic models"
    verification:
      tier: B
      checks:
        - "pytest tests/test_ingestion/test_semantic_scholar_client.py -v --no-cov"
    description: |
      NEW FILE: src/ingestion/semantic_scholar_client.py
      SemanticScholarClient class with: search_papers, get_paper, get_paper_references,
      get_paper_citations, batch_get_papers, resolve_identifier.
      Pydantic models: S2Paper, S2Author, S2SearchResult.
      Proactive rate limiting (asyncio.Semaphore, inter-request delay).
      Error handling: 404 skip, invalid ID ValueError, 5xx retry, batch partial failure.

  - id: wp-config
    name: "Source configuration & settings"
    tasks: ["3.1", "3.2", "3.3", "3.4", "3.5", "3.6", "3.7"]
    priority: 1
    depends_on: []
    scope:
      write_allow:
        - "src/config/sources.py"
        - "src/config/settings.py"
        - "sources.d/scholar.yaml"
        - "profiles/base.yaml"
        - "tests/test_config/test_scholar_sources.py"
      read_allow:
        - "src/config/**"
        - "sources.d/**"
        - "profiles/**"
      deny:
        - "src/ingestion/**"
        - "src/cli/**"
        - "web/**"
    locks:
      files:
        - "src/config/sources.py"
        - "src/config/settings.py"
        - "sources.d/scholar.yaml"
        - "profiles/base.yaml"
      keys:
        - "backend:config:sources"
        - "backend:config:settings"
      ttl_minutes: 60
      reason: "ScholarSource model, settings field, profile wiring, YAML config"
    verification:
      tier: B
      checks:
        - "pytest tests/test_config/test_scholar_sources.py -v --no-cov"
    description: |
      Add ScholarSource to sources.py discriminated union.
      Add SEMANTIC_SCHOLAR_API_KEY to Settings (optional, default empty).
      Wire in profiles/base.yaml. Create sources.d/scholar.yaml with 3 initial sources.

  - id: wp-frontend
    name: "Frontend source type registration"
    tasks: ["10.1", "10.2"]
    priority: 2
    depends_on: []
    scope:
      write_allow:
        - "web/src/routes/contents.tsx"
        - "web/src/routes/ingest.tsx"
      read_allow:
        - "web/src/**"
      deny:
        - "src/**"
        - "alembic/**"
    locks:
      files:
        - "web/src/routes/contents.tsx"
        - "web/src/routes/ingest.tsx"
      keys:
        - "frontend:routes:contents"
        - "frontend:routes:ingest"
      ttl_minutes: 30
      reason: "Add scholar entry to sourceConfig maps"
    verification:
      tier: C
      checks:
        - "cd web && pnpm exec tsc --noEmit"
    description: |
      Add scholar to sourceConfig in contents.tsx and ingest.tsx.
      Label: "Scholar", icon: GraduationCap from lucide-react.

  # ─────────────────────────────────────────────
  # Layer 1: Depends on client (wp-client)
  # ─────────────────────────────────────────────

