        - "tests/test_services/test_scholar_web_search.py"
      read_allow:
        - "src/services/**"
        - "src/ingestion/semantic_scholar_client.py"
      deny:
        - "src/cli/**"
        - "web/**"
    locks:
      files:
        - "src/services/web_search.py"
      keys:
        - "backend:services:web-search"
      ttl_minutes: 45
      reason: "ScholarWebSearchProvider + settings validation for non-default"
    verification:
      tier: B
      checks:
        - "pytest tests/test_services/test_scholar_web_search.py -v --no-cov"
    description: |
      Add ScholarWebSearchProvider to web_search.py.
