# OpenBao Development Overlay
# ============================
# Adds a local OpenBao server for secrets management development.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.openbao.yml up -d
#
# The server starts in dev mode (unsealed, in-memory storage) with a
# predictable root token for local development. NEVER use this config
# in production.
#
# After starting, seed secrets with:
#   BAO_ADDR=http://localhost:8200 BAO_TOKEN=dev-root-token \
#     python scripts/bao_seed_newsletter.py

services:
  openbao:
    image: quay.io/openbao/openbao:2.2
    container_name: newsletter-openbao
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: dev-root-token
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    command: server -dev
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 3
