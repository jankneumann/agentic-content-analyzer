name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run staging migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          echo "Running Alembic migrations against staging..."
          alembic upgrade head
          echo "Verifying migration revision..."
          python -c "
          from sqlalchemy import create_engine, text
          import os
          engine = create_engine(os.environ['DATABASE_URL'])
          with engine.connect() as conn:
              rev = conn.execute(text('SELECT version_num FROM alembic_version')).scalar()
              print(f'Staging DB at revision: {rev}')
          "

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh

      - name: Deploy to Railway staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --environment staging --detach

      - name: Verify staging health
        run: |
          echo "Waiting for staging deployment to become healthy..."
          STAGING_URL="${{ vars.STAGING_URL }}"
          if [ -z "$STAGING_URL" ]; then
            echo "::warning::STAGING_URL not configured — skipping health check"
            exit 0
          fi
          for i in $(seq 1 18); do
            if curl -sf "$STAGING_URL/health" > /dev/null 2>&1; then
              echo "Staging is healthy!"
              exit 0
            fi
            echo "Attempt $i/18 — waiting 10s..."
            sleep 10
          done
          echo "::error::Staging health check failed after 3 minutes"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run production migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          echo "Running Alembic migrations against production..."
          alembic upgrade head
          echo "Verifying migration revision..."
          python -c "
          from sqlalchemy import create_engine, text
          import os
          engine = create_engine(os.environ['DATABASE_URL'])
          with engine.connect() as conn:
              rev = conn.execute(text('SELECT version_num FROM alembic_version')).scalar()
              print(f'Production DB at revision: {rev}')
          "

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh

      - name: Deploy to Railway production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --environment production --detach

      - name: Deployment summary
        if: always()
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
