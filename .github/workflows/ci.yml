name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system ruff mypy

      - name: Run Ruff linter
        run: ruff check src/

      - name: Run Ruff formatter check
        run: ruff format --check src/

      - name: Check Alembic single head
        run: python scripts/check_alembic_heads.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run mypy type checking
        run: mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: paradedb/paradedb:0.22.2-pg17
        env:
          POSTGRES_USER: newsletter_user
          POSTGRES_PASSWORD: newsletter_password
          POSTGRES_DB: newsletters
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://newsletter_user:newsletter_password@localhost:5432/newsletters
          ANTHROPIC_API_KEY: test-key-for-ci
          ENVIRONMENT: test
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=25 -x -m "not hoverfly and not contract"

      - name: Coverage summary
        if: always()
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          pytest tests/ --cov=src --cov-report=term -m "not hoverfly and not contract" -q --no-header 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true

  contract-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: paradedb/paradedb:0.22.2-pg17
        env:
          POSTGRES_USER: newsletter_user
          POSTGRES_PASSWORD: newsletter_password
          POSTGRES_DB: newsletters
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://newsletter_user:newsletter_password@localhost:5432/newsletters
          APP_SECRET_KEY: test-secret-key-for-ci
        run: |
          alembic upgrade head

      - name: Run API contract and fuzz tests
        env:
          DATABASE_URL: postgresql://newsletter_user:newsletter_password@localhost:5432/newsletters
          DATABASE_PROVIDER: local
          ANTHROPIC_API_KEY: test-key-for-ci
          ADMIN_API_KEY: test-admin-key
          APP_SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: development
          WORKER_ENABLED: "false"
        run: |
          pytest tests/contract/ -m contract -v --no-cov --tb=short

  validate-profiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Validate all profiles
        env:
          ANTHROPIC_API_KEY: test-key-for-ci
        run: |
          echo "Validating profile templates..."
          for profile in profiles/*.yaml; do
            name=$(basename "$profile" .yaml)
            echo "Validating profile: $name"
            python -m src.cli profile validate "$name" || exit 1
          done
          echo "All profiles validated successfully!"

      - name: Check for hardcoded secrets in profiles
        run: |
          echo "Checking for hardcoded secrets in profiles..."
          # Check for common secret patterns in profile files
          if grep -rE "(sk-ant-|sk-[a-zA-Z0-9]{20,}|password\s*[:=]\s*['\"][^$][^'\"]+['\"])" profiles/*.yaml; then
            echo "::error::Potential hardcoded secrets found in profile files!"
            exit 1
          fi
          echo "No hardcoded secrets detected."
