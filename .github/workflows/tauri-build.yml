name: Tauri Desktop Build

on:
  push:
    branches: [main]
    paths:
      - 'web/src-tauri/**'
      - 'web/src/**'
      - 'web/package.json'
      - '.github/workflows/tauri-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/src-tauri/**'
      - 'web/src/**'
      - 'web/package.json'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web
          tauriScript: pnpm tauri

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-${{ matrix.target }}
          path: |
            web/src-tauri/target/release/bundle/**/*.dmg
            web/src-tauri/target/release/bundle/**/*.app
            web/src-tauri/target/release/bundle/**/*.deb
            web/src-tauri/target/release/bundle/**/*.AppImage
            web/src-tauri/target/release/bundle/**/*.msi
            web/src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: warn
          retention-days: 7
