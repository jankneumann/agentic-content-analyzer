name: Build Railway PostgreSQL Image

on:
  push:
    paths:
      - 'railway/postgres/**'
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/newsletter-postgres

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=17-railway
            type=sha,prefix=17-railway-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./railway/postgres
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate build summary
        run: |
          echo "## Railway PostgreSQL Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:17-railway\`" >> $GITHUB_STEP_SUMMARY
          echo "**Base:** \`paradedb/paradedb:0.22.2-pg17\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Extensions Included (via ParadeDB)" >> $GITHUB_STEP_SUMMARY
          echo "- pgvector 0.8.1" >> $GITHUB_STEP_SUMMARY
          echo "- pg_search 0.22.2" >> $GITHUB_STEP_SUMMARY
          echo "- pg_cron 1.6" >> $GITHUB_STEP_SUMMARY
          echo "- pg_ivm 1.13" >> $GITHUB_STEP_SUMMARY
          echo "- PostGIS 3.6.2" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:17-railway" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
