# =============================================================================
# Local Supabase Stack — Development
# =============================================================================
#
# Run alongside the main docker-compose.yml without port conflicts:
#
#   docker compose up -d                                                # core stack
#   docker compose -f docker-compose.supabase.yml -p supabase up -d    # supabase stack
#
# Or use Make targets (recommended):
#   make supabase-up      # Start Supabase stack with health check
#   make supabase-down    # Stop Supabase stack
#   make dev-supabase     # Start API with Supabase enabled
#
# Then configure profile:
#   export PROFILE=local-supabase   # Uses profiles/local-supabase.yaml
#
# Ports:
#   Supabase API:     http://localhost:54321  (Kong gateway)
#   Supabase DB:      localhost:54322         (PostgreSQL 15)
#   Supabase Storage: http://localhost:54323
#   PostgREST:        http://localhost:54324
#
# Tear down:
#   make supabase-down
#
# =============================================================================

services:
  supabase-db:
    image: supabase/postgres:15.8.1.060
    container_name: newsletter-supabase-db
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
      - ./supabase/docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    container_name: newsletter-supabase-rest
    ports:
      - "54324:3000"   # PostgREST API
    environment:
      PGRST_DB_URI: postgresql://authenticator:postgres@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -n > /dev/tcp/localhost/3000'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  supabase-storage:
    image: supabase/storage-api:v1.11.13
    container_name: newsletter-supabase-storage
    ports:
      - "54323:5000"   # Storage API (also accessible via Kong at 54321)
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      POSTGREST_URL: http://supabase-rest:3000
      DATABASE_URL: postgresql://supabase_storage_admin:postgres@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      IS_MULTITENANT: "false"
      ENABLE_IMAGE_TRANSFORMATION: "true"
      # S3 protocol support (used by SupabaseFileStorage)
      S3_PROTOCOL_ACCESS_KEY_ID: supabase
      S3_PROTOCOL_ACCESS_KEY_SECRET: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
    volumes:
      - supabase_storage_data:/var/lib/storage
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5000/status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  supabase-kong:
    image: kong:2.8.1
    container_name: newsletter-supabase-kong
    ports:
      - "54321:8000"   # API Gateway (main Supabase API endpoint)
      - "54320:8443"   # API Gateway SSL
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      supabase-rest:
        condition: service_healthy
      supabase-storage:
        condition: service_healthy

volumes:
  supabase_db_data:
  supabase_storage_data:
