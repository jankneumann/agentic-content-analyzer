# Base Profile - Development Defaults
# ====================================
# This profile provides sensible defaults for local development.
# Other profiles should extend this one and override specific settings.
#
# Usage:
#   export PROFILE=base
#   python -m src.api.app
#
# Or extend in another profile:
#   extends: base

name: base
description: Base configuration with local development defaults

# =============================================================================
# Provider Choices
# =============================================================================
# Choose which infrastructure providers to use.
# Options are validated at startup.

providers:
  database: local      # local, supabase, neon, railway
  neo4j: local         # local, auradb
  storage: local       # local, s3, supabase, railway
  observability: noop  # noop, opik, braintrust, otel, langfuse

# =============================================================================
# Settings
# =============================================================================

settings:
  # ---------------------------------------------------------------------------
  # Environment
  # ---------------------------------------------------------------------------
  environment: development
  log_level: INFO
  allowed_origins: "http://localhost:5173,http://localhost:3000"
  auth_cookie_cross_origin: "${AUTH_COOKIE_CROSS_ORIGIN:-false}"

  # ---------------------------------------------------------------------------
  # Database Settings
  # ---------------------------------------------------------------------------
  database:
    # Default local PostgreSQL (Docker Compose)
    database_url: "postgresql://newsletter_user:newsletter_password@localhost:5432/newsletters"

  # ---------------------------------------------------------------------------
  # Neo4j / Knowledge Graph Settings
  # ---------------------------------------------------------------------------
  neo4j:
    # Default local Neo4j (Docker Compose)
    neo4j_uri: "bolt://localhost:7687"
    neo4j_user: neo4j
    neo4j_password: "${NEO4J_PASSWORD:-newsletter_password}"
    semaphore_limit: 1

  # ---------------------------------------------------------------------------
  # Storage Settings
  # ---------------------------------------------------------------------------
  storage:
    storage_provider: local
    image_storage_provider: local
    image_storage_path: "data/images"
    image_max_size_mb: 10

  # ---------------------------------------------------------------------------
  # Observability Settings
  # ---------------------------------------------------------------------------
  observability:
    otel_enabled: false
    otel_service_name: newsletter-aggregator

  # ---------------------------------------------------------------------------
  # Search & Embedding Settings
  # ---------------------------------------------------------------------------
  search:
    embedding_provider: local
    embedding_model: all-MiniLM-L6-v2
    embedding_dimensions: 384
    search_bm25_strategy: auto
    search_rerank_enabled: false
    search_rerank_provider: cohere
    search_rerank_model: null
    search_rerank_top_k: 50
    chunk_size_tokens: 512
    chunk_overlap_tokens: 64
    search_bm25_weight: 0.5
    search_vector_weight: 0.5
    search_rrf_k: 60
    search_default_limit: 20
    search_max_limit: 100
    enable_search_indexing: true
    embedding_trust_remote_code: false
    embedding_max_seq_length: null

  # ---------------------------------------------------------------------------
  # API Keys (loaded from secrets)
  # ---------------------------------------------------------------------------
  # These use ${VAR} syntax to reference secrets from .secrets.yaml
  # Environment variables always take precedence.
  api_keys:
    anthropic_api_key: "${ANTHROPIC_API_KEY}"
    openai_api_key: "${OPENAI_API_KEY:-}"
    google_api_key: "${GOOGLE_API_KEY:-}"
    tavily_api_key: "${TAVILY_API_KEY:-}"
    elevenlabs_api_key: "${ELEVENLABS_API_KEY:-}"
    sendgrid_api_key: "${SENDGRID_API_KEY:-}"
    substack_session_cookie: "${SUBSTACK_SESSION_COOKIE:-}"
    admin_api_key: "${ADMIN_API_KEY:-}"
    app_secret_key: "${APP_SECRET_KEY:-}"
    voyage_api_key: "${VOYAGE_API_KEY:-}"
    cohere_api_key: "${COHERE_API_KEY:-}"
    jina_api_key: "${JINA_API_KEY:-}"
    xai_api_key: "${XAI_API_KEY:-}"
    perplexity_api_key: "${PERPLEXITY_API_KEY:-}"
    semantic_scholar_api_key: "${SEMANTIC_SCHOLAR_API_KEY:-}"
    langfuse_public_key: "${LANGFUSE_PUBLIC_KEY:-}"
    langfuse_secret_key: "${LANGFUSE_SECRET_KEY:-}"
    web_search_provider: "${WEB_SEARCH_PROVIDER:-tavily}"

  # ---------------------------------------------------------------------------
  # Crawl4AI Settings
  # ---------------------------------------------------------------------------
  crawl4ai:
    crawl4ai_enabled: ${CRAWL4AI_ENABLED:-false}
    crawl4ai_cache_mode: ${CRAWL4AI_CACHE_MODE:-bypass}
    crawl4ai_server_url: ${CRAWL4AI_SERVER_URL:-}
    crawl4ai_page_timeout: ${CRAWL4AI_PAGE_TIMEOUT:-30000}

  # ---------------------------------------------------------------------------
  # CLI API Client Settings
  # ---------------------------------------------------------------------------
  api:
    api_base_url: "http://localhost:8000"
    api_timeout: 300

  # ---------------------------------------------------------------------------
  # Digest Settings
  # ---------------------------------------------------------------------------
  digest:
    digest_context_window_percentage: 0.5
    digest_newsletter_budget_percentage: 0.6
    digest_theme_budget_percentage: 0.3
    digest_prompt_overhead_percentage: 0.1
    daily_digest_hour: 7
    weekly_digest_day: 1
    weekly_digest_hour: 7
