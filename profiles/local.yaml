# Local Development Profile
# ==========================
# Extends base profile with Docker Compose local development settings.
# All services run locally via Docker Compose.
#
# Observability: Langfuse self-hosted at http://localhost:3100
# Start Langfuse first: make langfuse-up
#   (or: docker compose -f docker-compose.langfuse.yml -p langfuse up -d)
# If Langfuse stack is not running, traces are silently dropped (noop-equivalent).
# To disable tracing entirely: set OBSERVABILITY_PROVIDER=noop
#
# Usage:
#   make langfuse-up                 # Start Langfuse stack
#   docker compose up -d             # Start app services
#   export PROFILE=local
#   python -m src.api.app

name: local
extends: base
description: Local development with Docker Compose services

# Providers - all local
providers:
  database: local
  graphdb: neo4j       # top-level graph backend
  neo4j: local         # kept for backward compat
  storage: local
  observability: langfuse

settings:
  environment: development
  log_level: DEBUG

  database:
    # Local PostgreSQL from Docker Compose
    database_url: "postgresql://newsletter_user:newsletter_password@localhost:5432/newsletters"

  graphdb:
    graphdb_mode: local

  neo4j:
    # Local Neo4j from Docker Compose
    neo4j_local_uri: "bolt://localhost:7687"
    neo4j_local_user: neo4j
    neo4j_local_password: "${NEO4J_PASSWORD:-newsletter_password}"

  storage:
    storage_provider: local
    image_storage_path: "data/images"

  observability:
    # Self-hosted Langfuse at localhost:3100
    # Requires: make langfuse-up (starts docker-compose.langfuse.yml)
    # First start: Create account at http://localhost:3100, get API keys from Settings > API Keys
    otel_enabled: true
    otel_service_name: newsletter-aggregator
    langfuse_base_url: "http://localhost:3100"
