# CI Profile — Neon Branch per PR
# ================================
# Used by GitHub Actions when running tests against a Neon branch
# created by neondatabase/create-branch-action.
#
# The connection string comes from the action's output, injected as
# NEON_DATABASE_URL environment variable. Environment variables always
# take precedence over profile settings.
#
# Other providers stay local/noop — CI doesn't need cloud Neo4j,
# storage, or observability for unit/integration tests.
#
# Usage (in GitHub Actions):
#   env:
#     PROFILE: ci-neon
#     NEON_DATABASE_URL: ${{ needs.create-branch.outputs.db_url_pooled }}
#     NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
#     NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}

name: ci-neon
extends: base
description: CI job profile — Neon branch created per PR

providers:
  database: neon
  neo4j: local
  storage: local
  observability: noop

settings:
  environment: development
  log_level: WARNING

  database:
    # Injected by create-branch-action output → env var (env wins over profile)
    neon_database_url: "${NEON_DATABASE_URL}"
    neon_api_key: "${NEON_API_KEY:-}"
    neon_project_id: "${NEON_PROJECT_ID:-}"

  neo4j:
    neo4j_uri: "bolt://localhost:7687"
    neo4j_user: neo4j
    neo4j_password: "${NEO4J_PASSWORD:-newsletter_password}"

  api_keys:
    anthropic_api_key: "${ANTHROPIC_API_KEY:-test-key-for-ci}"
    admin_api_key: "${ADMIN_API_KEY:-test-admin-key-for-ci}"
