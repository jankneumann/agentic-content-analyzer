# Railway Deployment Profile
# ===========================
# Extends base profile for Railway.app deployment.
# Uses Railway PostgreSQL, MinIO for storage, and Neo4j AuraDB.
#
# Railway auto-injects these environment variables:
#   - RAILWAY_DATABASE_URL (or DATABASE_URL)
#   - MINIO_ROOT_USER, MINIO_ROOT_PASSWORD (if MinIO service added)
#   - PORT (for the web service)
#
# Database: ParadeDB GHCR image (ghcr.io/jankneumann/aca-postgres:17-railway)
#   Pre-installed extensions: pgvector, pg_search, pgmq, pg_cron
#   See railway/postgres/README.md for deployment instructions
#
# Required secrets in .secrets.yaml or environment:
#   - NEO4J_AURADB_URI
#   - NEO4J_AURADB_PASSWORD
#   - LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY (for observability)
#   - ANTHROPIC_API_KEY
#
# Override to Braintrust: set OBSERVABILITY_PROVIDER=braintrust and BRAINTRUST_API_KEY
#
# Usage:
#   Set PROFILE=railway in Railway service variables

name: railway
extends: base
description: Railway.app production deployment

providers:
  database: railway
  graphdb: neo4j       # top-level graph backend
  neo4j: auradb        # kept for backward compat
  storage: railway
  observability: langfuse

settings:
  environment: production
  log_level: INFO

  # CORS - update with your Railway frontend URL
  allowed_origins: "${ALLOWED_ORIGINS:-https://your-app.up.railway.app}"

  api:
    api_base_url: "${API_BASE_URL:-https://your-app.up.railway.app}"
    api_timeout: 300

  database:
    # Railway auto-injects DATABASE_URL or RAILWAY_DATABASE_URL
    railway_database_url: "${RAILWAY_DATABASE_URL:-${DATABASE_URL}}"

    # Railway PostgreSQL pool settings (optimized for Hobby plan)
    railway_pool_size: 3
    railway_max_overflow: 2
    railway_pool_recycle: 300
    railway_pool_timeout: 30

  graphdb:
    graphdb_mode: cloud

  neo4j:
    # Neo4j AuraDB (free tier available)
    neo4j_auradb_uri: "${NEO4J_AURADB_URI}"
    neo4j_auradb_user: neo4j
    neo4j_auradb_password: "${NEO4J_AURADB_PASSWORD}"

  storage:
    # Railway MinIO (auto-injected credentials)
    storage_provider: railway
    minio_root_user: "${MINIO_ROOT_USER}"
    minio_root_password: "${MINIO_ROOT_PASSWORD}"
    railway_minio_endpoint: "${RAILWAY_MINIO_ENDPOINT:-}"
    railway_minio_bucket: "${RAILWAY_MINIO_BUCKET:-newsletter-files}"

  observability:
    # Langfuse Cloud for LLM observability
    langfuse_public_key: "${LANGFUSE_PUBLIC_KEY}"
    langfuse_secret_key: "${LANGFUSE_SECRET_KEY}"

    otel_enabled: true
    otel_service_name: newsletter-aggregator

  api_keys:
    anthropic_api_key: "${ANTHROPIC_API_KEY}"
    openai_api_key: "${OPENAI_API_KEY:-}"
    google_api_key: "${GOOGLE_API_KEY:-}"
    tavily_api_key: "${TAVILY_API_KEY:-}"
    elevenlabs_api_key: "${ELEVENLABS_API_KEY:-}"
    sendgrid_api_key: "${SENDGRID_API_KEY:-}"
    admin_api_key: "${ADMIN_API_KEY:-}"
    voyage_api_key: "${VOYAGE_API_KEY:-}"
    cohere_api_key: "${COHERE_API_KEY:-}"
    jina_api_key: "${JINA_API_KEY:-}"

  search:
    embedding_provider: openai
    embedding_model: text-embedding-3-small
    embedding_dimensions: 1536
    search_rerank_enabled: true
    search_rerank_provider: cohere
    search_rerank_model: rerank-english-v3.0
