# Railway + Neon Staging Profile
# ================================
# Staging variant of railway-neon for CI/CD and pre-production validation.
#
# Key difference from production:
#   - environment: staging (enables staging-specific behavior)
#   - Separate Braintrust project for staging traces
#   - Staging-specific MinIO bucket
#   - Neon branching is especially useful here: create a branch from
#     production data, run smoke tests / Playwright E2E against it,
#     then delete the branch — zero risk to production data
#
# Staging secrets: Set the same env var names (NEON_DATABASE_URL, etc.)
# to your staging values. Environment variables always take precedence
# over profile settings, so the same var names work for both profiles.
#
# Usage:
#   export PROFILE=railway-neon-staging
#   # Or in CI: PROFILE=railway-neon-staging pytest -m smoke

name: railway-neon-staging
extends: base
description: Staging deployment — Railway compute + Neon database branching

providers:
  database: neon
  graphdb: neo4j       # top-level graph backend
  neo4j: auradb        # kept for backward compat
  storage: railway
  observability: braintrust

settings:
  environment: staging
  log_level: INFO

  allowed_origins: "${ALLOWED_ORIGINS:-https://staging.your-app.up.railway.app}"

  database:
    neon_database_url: "${NEON_DATABASE_URL}"
    neon_direct_url: "${NEON_DIRECT_URL:-}"

    # Branch management — staging should always have these for E2E test branching
    neon_api_key: "${NEON_API_KEY:-}"
    neon_project_id: "${NEON_PROJECT_ID:-}"
    neon_default_branch: "${NEON_DEFAULT_BRANCH:-main}"

  graphdb:
    graphdb_mode: cloud

  neo4j:
    neo4j_auradb_uri: "${NEO4J_AURADB_URI}"
    neo4j_auradb_user: neo4j
    neo4j_auradb_password: "${NEO4J_AURADB_PASSWORD}"

  storage:
    minio_root_user: "${MINIO_ROOT_USER}"
    minio_root_password: "${MINIO_ROOT_PASSWORD}"
    railway_minio_endpoint: "${RAILWAY_MINIO_ENDPOINT:-}"
    railway_minio_bucket: "${RAILWAY_MINIO_BUCKET:-newsletter-files-staging}"

  observability:
    braintrust_api_key: "${BRAINTRUST_API_KEY:-}"
    braintrust_project_name: "AI Content Analyzer Staging"
    otel_enabled: true
    otel_service_name: "newsletter-aggregator-staging"
    otel_exporter_otlp_endpoint: "https://api.braintrust.dev/otel/v1/traces"

  api_keys:
    anthropic_api_key: "${ANTHROPIC_API_KEY:-}"
    openai_api_key: "${OPENAI_API_KEY:-}"
    google_api_key: "${GOOGLE_API_KEY:-}"
    tavily_api_key: "${TAVILY_API_KEY:-}"
    elevenlabs_api_key: "${ELEVENLABS_API_KEY:-}"
    sendgrid_api_key: "${SENDGRID_API_KEY:-}"
    admin_api_key: "${ADMIN_API_KEY:-}"
    voyage_api_key: "${VOYAGE_API_KEY:-}"
    cohere_api_key: "${COHERE_API_KEY:-}"
    jina_api_key: "${JINA_API_KEY:-}"

  search:
    embedding_provider: openai
    embedding_model: text-embedding-3-small
    embedding_dimensions: 1536
    search_rerank_enabled: true
    search_rerank_provider: cohere
