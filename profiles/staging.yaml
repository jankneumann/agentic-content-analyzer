# Staging Profile
# ===============
# Production-like configuration for CI/CD and pre-production validation.
# Uses Railway PostgreSQL + MinIO and Neo4j AuraDB, and sends observability
# to a dedicated Langfuse project (no production pollution).
#
# Usage:
#   export PROFILE=staging
#   export STAGING_RAILWAY_DATABASE_URL=...
#   export STAGING_RAILWAY_MINIO_ENDPOINT=...
#   export STAGING_NEO4J_AURADB_URI=...
#   export STAGING_NEO4J_AURADB_PASSWORD=...

name: staging
extends: base
description: Staging deployment for CI/CD with production-like providers

providers:
  database: railway
  neo4j: auradb
  storage: railway
  observability: langfuse

settings:
  environment: staging
  log_level: INFO

  # CORS - update with your staging frontend URL
  allowed_origins: "${ALLOWED_ORIGINS:-https://staging.your-app.up.railway.app}"

  database:
    # Prefer staging-specific env vars, then fall back to Railway defaults
    railway_database_url: "${STAGING_RAILWAY_DATABASE_URL:-${RAILWAY_DATABASE_URL:-${DATABASE_URL}}}"

    # Keep pool settings aligned with production for realistic behavior
    railway_pool_size: 3
    railway_max_overflow: 2
    railway_pool_recycle: 300
    railway_pool_timeout: 30

  neo4j:
    neo4j_auradb_uri: "${STAGING_NEO4J_AURADB_URI:-${NEO4J_AURADB_URI}}"
    neo4j_auradb_user: "${STAGING_NEO4J_AURADB_USER:-neo4j}"
    neo4j_auradb_password: "${STAGING_NEO4J_AURADB_PASSWORD:-${NEO4J_AURADB_PASSWORD}}"

  storage:
    minio_root_user: "${STAGING_MINIO_ROOT_USER:-${MINIO_ROOT_USER}}"
    minio_root_password: "${STAGING_MINIO_ROOT_PASSWORD:-${MINIO_ROOT_PASSWORD}}"
    railway_minio_endpoint: "${STAGING_RAILWAY_MINIO_ENDPOINT:-${RAILWAY_MINIO_ENDPOINT:-}}"
    railway_minio_bucket: "${STAGING_RAILWAY_MINIO_BUCKET:-newsletter-files-staging}"

  observability:
    langfuse_public_key: "${STAGING_LANGFUSE_PUBLIC_KEY:-${LANGFUSE_PUBLIC_KEY:-}}"
    langfuse_secret_key: "${STAGING_LANGFUSE_SECRET_KEY:-${LANGFUSE_SECRET_KEY:-}}"
    otel_enabled: true
    otel_service_name: "newsletter-aggregator-staging"

  api_keys:
    anthropic_api_key: "${STAGING_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}"
    openai_api_key: "${STAGING_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}"
    google_api_key: "${STAGING_GOOGLE_API_KEY:-${GOOGLE_API_KEY:-}}"
    tavily_api_key: "${STAGING_TAVILY_API_KEY:-${TAVILY_API_KEY:-}}"
    elevenlabs_api_key: "${STAGING_ELEVENLABS_API_KEY:-${ELEVENLABS_API_KEY:-}}"
    sendgrid_api_key: "${STAGING_SENDGRID_API_KEY:-${SENDGRID_API_KEY:-}}"
    admin_api_key: "${STAGING_ADMIN_API_KEY:-${ADMIN_API_KEY:-}}"
    voyage_api_key: "${STAGING_VOYAGE_API_KEY:-${VOYAGE_API_KEY:-}}"
    cohere_api_key: "${STAGING_COHERE_API_KEY:-${COHERE_API_KEY:-}}"
    jina_api_key: "${STAGING_JINA_API_KEY:-${JINA_API_KEY:-}}"

  search:
    embedding_provider: openai
    embedding_model: text-embedding-3-small
    embedding_dimensions: 1536
    search_rerank_enabled: true
    search_rerank_provider: cohere
