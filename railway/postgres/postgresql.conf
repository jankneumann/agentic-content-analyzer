# PostgreSQL configuration optimized for Railway Hobby plan (512 MB RAM)
# See: https://pgtune.leopard.in.ua/ for tuning recommendations

# ============================================
# Memory Settings
# ============================================
# ~25% of available RAM for shared buffers
shared_buffers = 128MB

# Effective cache size (OS cache + shared_buffers, ~50% of RAM)
effective_cache_size = 256MB

# Memory per-operation (sorts, hashes)
work_mem = 4MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 64MB

# ============================================
# Connection Settings
# ============================================
# Conservative for Hobby plan — app uses pool_size=3, max_overflow=2
max_connections = 20

# ============================================
# WAL Settings
# ============================================
wal_buffers = 4MB
min_wal_size = 80MB
max_wal_size = 1GB

# ============================================
# Query Planner
# ============================================
random_page_cost = 1.1
effective_io_concurrency = 200

# ============================================
# Extensions
# ============================================
# pg_cron and pg_search require shared_preload_libraries
shared_preload_libraries = 'pg_cron,pg_search'
cron.database_name = 'postgres'

# ============================================
# Logging
# ============================================
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# ============================================
# Autovacuum
# ============================================
autovacuum_max_workers = 2
autovacuum_naptime = 30s
