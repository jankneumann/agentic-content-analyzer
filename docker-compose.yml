services:
  postgres:
    image: paradedb/paradedb:0.22.2-pg17
    # No container_name — auto-generated from COMPOSE_PROJECT_NAME
    # to support isolated stacks per worktree via port allocator
    environment:
      POSTGRES_DB: newsletters
      POSTGRES_USER: newsletter_user
      # WARNING: Development credentials only. Never use these values in production.
      POSTGRES_PASSWORD: newsletter_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsletter_user -d newsletters"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    # No container_name — same reason as postgres above
    environment:
      # WARNING: Development credentials only. Never use these values in production.
      NEO4J_AUTH: neo4j/newsletter_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"  # HTTP
      - "${NEO4J_BOLT_PORT:-7687}:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsletter_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  neo4j-test:
    image: neo4j:5
    # No container_name — same reason as postgres above
    environment:
      # WARNING: Development credentials only. Never use these values in production.
      NEO4J_AUTH: neo4j/newsletter_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "${NEO4J_TEST_HTTP_PORT:-7475}:7474"  # HTTP (test)
      - "${NEO4J_TEST_BOLT_PORT:-7688}:7687"  # Bolt (test)
    volumes:
      - neo4j_test_data:/data
      - neo4j_test_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsletter_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
    profiles:
      - test  # Only start with --profile test or when explicitly specified

  hoverfly:
    image: spectolabs/hoverfly:v1.10.5
    # No container_name — same reason as postgres above
    ports:
      - "${HOVERFLY_PORT:-8500}:8500"  # Proxy/webserver port
      - "${HOVERFLY_ADMIN_PORT:-8888}:8888"  # Admin API port
    command: ["-webserver"]  # Webserver mode: acts as destination server, not proxy
    volumes:
      - ./tests/integration/fixtures/simulations:/simulations:ro
    profiles:
      - test  # Only start with --profile test or when explicitly specified

  crawl4ai:
    image: unclecode/crawl4ai:latest
    # No container_name — same reason as postgres above
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    shm_size: '1g'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11235/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - crawl4ai  # Only start with --profile crawl4ai or when explicitly specified

  falkordb:
    image: falkordb/falkordb:v4.18.1
    # No container_name — same reason as postgres above
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  falkordb-test:
    image: falkordb/falkordb:v4.18.1
    # No container_name — same reason as postgres above
    ports:
      - "${FALKORDB_TEST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - test  # Only start with --profile test or when explicitly specified

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_test_data:
  neo4j_test_logs:
  falkordb_data:
