services:
  postgres:
    image: paradedb/paradedb:0.22.2-pg17
    container_name: newsletter-postgres
    environment:
      POSTGRES_DB: newsletters
      POSTGRES_USER: newsletter_user
      # WARNING: Development credentials only. Never use these values in production.
      POSTGRES_PASSWORD: newsletter_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsletter_user -d newsletters"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: newsletter-neo4j
    environment:
      # WARNING: Development credentials only. Never use these values in production.
      NEO4J_AUTH: neo4j/newsletter_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsletter_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  neo4j-test:
    image: neo4j:5
    container_name: newsletter-neo4j-test
    environment:
      # WARNING: Development credentials only. Never use these values in production.
      NEO4J_AUTH: neo4j/newsletter_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7475:7474"  # HTTP (test)
      - "7688:7687"  # Bolt (test)
    volumes:
      - neo4j_test_data:/data
      - neo4j_test_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsletter_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
    profiles:
      - test  # Only start with --profile test or when explicitly specified

  hoverfly:
    image: spectolabs/hoverfly:v1.10.5
    container_name: newsletter-hoverfly
    ports:
      - "8500:8500"  # Proxy/webserver port
      - "8888:8888"  # Admin API port
    command: ["-webserver"]  # Webserver mode: acts as destination server, not proxy
    volumes:
      - ./tests/integration/fixtures/simulations:/simulations:ro
    profiles:
      - test  # Only start with --profile test or when explicitly specified

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: newsletter-crawl4ai
    ports:
      - "11235:11235"
    shm_size: '1g'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11235/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - crawl4ai  # Only start with --profile crawl4ai or when explicitly specified

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_test_data:
  neo4j_test_logs:
