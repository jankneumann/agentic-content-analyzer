services:
  postgres:
    image: postgres:17
    container_name: newsletter-postgres
    environment:
      POSTGRES_DB: newsletters
      POSTGRES_USER: newsletter_user
      POSTGRES_PASSWORD: newsletter_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsletter_user -d newsletters"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newsletter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: newsletter-neo4j
    environment:
      NEO4J_AUTH: neo4j/newsletter_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsletter_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  neo4j-test:
    image: neo4j:5
    container_name: newsletter-neo4j-test
    environment:
      NEO4J_AUTH: neo4j/newsletter_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7475:7474"  # HTTP (test)
      - "7688:7687"  # Bolt (test)
    volumes:
      - neo4j_test_data:/data
      - neo4j_test_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsletter_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
    profiles:
      - test  # Only start with --profile test or when explicitly specified

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_test_data:
  neo4j_test_logs:
