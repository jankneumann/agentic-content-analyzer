services:
  postgres:
    image: postgres:15
    container_name: newsletter-postgres
    environment:
      POSTGRES_DB: newsletters
      POSTGRES_USER: newsletter_user
      POSTGRES_PASSWORD: newsletter_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsletter_user -d newsletters"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newsletter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: newsletter-neo4j
    environment:
      NEO4J_AUTH: neo4j/newsletter_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsletter_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  neo4j-test:
    image: neo4j:5
    container_name: newsletter-neo4j-test
    environment:
      NEO4J_AUTH: neo4j/newsletter_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7475:7474"  # HTTP (test)
      - "7688:7687"  # Bolt (test)
    volumes:
      - neo4j_test_data:/data
      - neo4j_test_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p newsletter_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
    profiles:
      - test  # Only start with --profile test or when explicitly specified

  # ===========================================
  # Local Supabase Services (opt-in via profile)
  # Start with: docker compose --profile supabase up -d
  # ===========================================

  supabase-db:
    image: supabase/postgres:15.1.1.41
    container_name: newsletter-supabase-db
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - supabase

  supabase-kong:
    image: kong:2.8.1
    container_name: newsletter-supabase-kong
    ports:
      - "54321:8000"  # API Gateway (main Supabase API endpoint)
      - "54320:8443"  # API Gateway SSL
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      supabase-db:
        condition: service_healthy
    profiles:
      - supabase

  supabase-storage:
    image: supabase/storage-api:v0.43.11
    container_name: newsletter-supabase-storage
    ports:
      - "54323:5000"  # Storage API (also accessible via Kong at 54321)
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      POSTGREST_URL: http://supabase-rest:3000
      DATABASE_URL: postgresql://postgres:postgres@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      IS_MULTITENANT: "false"
      ENABLE_IMAGE_TRANSFORMATION: "true"
    volumes:
      - supabase_storage_data:/var/lib/storage
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - supabase

  supabase-rest:
    image: postgrest/postgrest:v11.2.2
    container_name: newsletter-supabase-rest
    environment:
      PGRST_DB_URI: postgresql://postgres:postgres@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"
    depends_on:
      supabase-db:
        condition: service_healthy
    profiles:
      - supabase

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_test_data:
  neo4j_test_logs:
  supabase_db_data:
  supabase_storage_data:
