# Default model selection per pipeline step (using family-based IDs)
default_models:
  summarization: claude-haiku-4-5  # Fast, cheap for structured extraction
  theme_analysis: claude-sonnet-4-5  # Better reasoning for theme extraction
  digest_creation: claude-sonnet-4-5  # Balanced quality/cost for long-form
  digest_revision: claude-sonnet-4-5  # Quality-critical for conversational refinement
  historical_context: claude-sonnet-4-5  # Good at temporal reasoning
  youtube_processing: gemini-2.0-flash  # Native YouTube support, very cheap
  entity_extraction: claude-haiku-4-5  # Structured extraction, cost-effective
  reranking: gpt-4o-mini  # Fast, cheap for simple ranking

# Notes on provider tiers and pricing:
# - Anthropic: Base pricing, direct API access
# - AWS Bedrock: ~15% markup, pay-as-you-go "on-demand" tier
# - Google Vertex AI: Similar to base, sometimes with enterprise discounts
# - Microsoft Azure: ~15% markup, requires Azure subscription
# - OpenAI: Base pricing for direct API
# - Google AI Studio: Free tier available, then standard pricing
#
