# Model Registry Configuration
# Updated: December 2024
#
# This file contains:
# 1. Model definitions (provider-agnostic capabilities)
# 2. Provider-model configurations (provider-specific pricing, limits, tiers)
#
# Update this file when:
# - New models are released
# - Pricing changes
# - Context windows are increased
# - New providers add support for existing models

# Model Definitions (provider-agnostic)
models:
  # Claude 4.5 Family
  claude-haiku-4-5-20251001:
    family: claude
    name: "Claude 4.5 Haiku"
    supports_vision: true
    supports_video: false

  claude-sonnet-4-5-20250929:
    family: claude
    name: "Claude 4.5 Sonnet"
    supports_vision: true
    supports_video: false

  claude-opus-4-5-20251024:
    family: claude
    name: "Claude 4.5 Opus"
    supports_vision: true
    supports_video: false

  # Legacy Claude
  claude-sonnet-4-20250514:
    family: claude
    name: "Claude Sonnet 4"
    supports_vision: true
    supports_video: false

  # Gemini 2.0 Family
  gemini-2.0-flash-exp:
    family: gemini
    name: "Gemini 2.0 Flash"
    supports_vision: true
    supports_video: true  # Native YouTube URL support

  gemini-2.0-pro:
    family: gemini
    name: "Gemini 2.0 Pro"
    supports_vision: true
    supports_video: true  # Native YouTube URL support

  # OpenAI GPT-4o Family
  gpt-4o:
    family: gpt
    name: "GPT-4o"
    supports_vision: true
    supports_video: false

  gpt-4o-mini:
    family: gpt
    name: "GPT-4o Mini"
    supports_vision: true
    supports_video: false

  o1-mini:
    family: gpt
    name: "OpenAI o1-mini"
    supports_vision: false
    supports_video: false

