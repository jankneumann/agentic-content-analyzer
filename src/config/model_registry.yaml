# Model Registry Configuration
# Updated: December 2024 (Refactored: Family-based model IDs)
#
# This file contains:
# 1. Model definitions (provider-agnostic capabilities, family-based IDs)
# 2. Provider-model configurations (provider-specific model IDs, pricing, limits)
#
# Update this file when:
# - New models are released
# - Pricing changes
# - Context windows are increased
# - New providers add support for existing models
#
# Key Changes (Dec 2024 Refactoring):
# - Model IDs are now family-based (e.g., "claude-sonnet-4-5" instead of "claude-sonnet-4-5-20250929")
# - Each model has a default_version field
# - Provider configs have provider_model_id field with the actual API identifier

# Model Definitions (provider-agnostic, family-based IDs)
models:
  # Claude 4.5 Family
  claude-haiku-4-5:
    family: claude
    name: "Claude 4.5 Haiku"
    supports_vision: true
    supports_video: false
    default_version: "20251001"

  claude-sonnet-4-5:
    family: claude
    name: "Claude 4.5 Sonnet"
    supports_vision: true
    supports_video: false
    default_version: "20250929"

  claude-opus-4-5:
    family: claude
    name: "Claude 4.5 Opus"
    supports_vision: true
    supports_video: false
    default_version: "20251024"

  # Legacy Claude
  claude-sonnet-4:
    family: claude
    name: "Claude Sonnet 4"
    supports_vision: true
    supports_video: false
    default_version: "20250514"

  # Gemini 2.0 Family
  gemini-2.0-flash:
    family: gemini
    name: "Gemini 2.0 Flash"
    supports_vision: true
    supports_video: true  # Native YouTube URL support
    default_version: "exp"

  gemini-2.0-pro:
    family: gemini
    name: "Gemini 2.0 Pro"
    supports_vision: true
    supports_video: true  # Native YouTube URL support
    default_version: "001"

  # OpenAI GPT-4o Family
  gpt-4o:
    family: gpt
    name: "GPT-4o"
    supports_vision: true
    supports_video: false
    default_version: "2024-11-20"

  gpt-4o-mini:
    family: gpt
    name: "GPT-4o Mini"
    supports_vision: true
    supports_video: false
    default_version: "2024-07-18"

  o1-mini:
    family: gpt
    name: "OpenAI o1-mini"
    supports_vision: false
    supports_video: false
    default_version: "2024-09-12"

# Provider-Model Configurations
# Format: provider.model-family (NO version/date in key)
# Each config includes provider_model_id with the actual API identifier
provider_model_configs:
  # Claude Haiku 4.5
  anthropic.claude-haiku-4-5:
    provider_model_id: "claude-haiku-4-5-20251001"  # Anthropic API identifier
    cost_per_mtok_input: 0.80  # $0.80 per million input tokens
    cost_per_mtok_output: 4.00  # $4.00 per million output tokens
    context_window: 200000
    max_output_tokens: 8192
    tier: standard

