<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Save to Newsletter Aggregator</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --input-bg: #f5f5f5;
            --input-border: #e0e0e0;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #22c55e;
            --error-color: #ef4444;
            --muted-color: #666;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #e5e5e5;
                --input-bg: #2a2a2a;
                --input-border: #404040;
                --primary-color: #6366f1;
                --primary-hover: #818cf8;
                --muted-color: #999;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input[type="url"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            min-height: 52px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            -webkit-appearance: none;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-height: 56px;
            -webkit-appearance: none;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .status.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .status.success {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .status.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        .status.loading {
            background-color: rgba(79, 70, 229, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .hidden {
            display: none;
        }

        .hint {
            font-size: 14px;
            color: var(--muted-color);
            margin-top: 4px;
        }

        .recent-saves {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--input-border);
        }

        .recent-saves h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .recent-saves ul {
            list-style: none;
        }

        .recent-saves li {
            padding: 12px 0;
            border-bottom: 1px solid var(--input-border);
            font-size: 14px;
        }

        .recent-saves li:last-child {
            border-bottom: none;
        }

        .recent-saves .save-url {
            color: var(--primary-color);
            text-decoration: none;
            word-break: break-all;
            display: block;
        }

        .recent-saves .save-time {
            color: var(--muted-color);
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <h1>Save URL</h1>

    <form id="save-form">
        <div class="form-group">
            <label for="url">URL *</label>
            <input
                type="url"
                id="url"
                name="url"
                value="{{ url }}"
                placeholder="https://example.com/article"
                required
                autocomplete="off"
            >
        </div>

        <div class="form-group">
            <label for="title">Title</label>
            <input
                type="text"
                id="title"
                name="title"
                value="{{ title }}"
                placeholder="Article title (auto-extracted if empty)"
            >
            <p class="hint">Leave empty to extract from page</p>
        </div>

        <div class="form-group">
            <label for="excerpt">Excerpt / Notes</label>
            <textarea
                id="excerpt"
                name="excerpt"
                placeholder="Selected text or notes about this content"
            >{{ excerpt }}</textarea>
        </div>

        <button type="submit" id="submit-btn">Save</button>
    </form>

    <div id="status" class="status hidden"></div>

    <div id="recent-saves" class="recent-saves hidden">
        <h2>Recent Saves</h2>
        <ul id="recent-list"></ul>
    </div>

    <script>
        // API base URL injected from server (supports cross-origin bookmarklet use)
        const API_BASE = {{ api_base_url | tojson }};
        const form = document.getElementById('save-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusDiv = document.getElementById('status');

        // --- Status animation helpers ---
        function showStatus(className, text) {
            statusDiv.textContent = text;
            statusDiv.className = 'status ' + className;
            statusDiv.classList.remove('hidden');
            // Trigger reflow so the transition plays from opacity:0
            void statusDiv.offsetHeight;
            statusDiv.classList.add('visible');
        }

        function showStatusWithContent(className, buildContent) {
            statusDiv.textContent = '';
            buildContent(statusDiv);
            statusDiv.className = 'status ' + className;
            statusDiv.classList.remove('hidden');
            void statusDiv.offsetHeight;
            statusDiv.classList.add('visible');
        }

        function hideStatus() {
            statusDiv.classList.remove('visible');
            statusDiv.addEventListener('transitionend', function handler() {
                statusDiv.removeEventListener('transitionend', handler);
                statusDiv.classList.add('hidden');
            });
        }

        // --- Recent saves management ---
        const RECENT_KEY = 'newsletter-recent-saves';
        const MAX_RECENT = 5;

        function loadRecentSaves() {
            try {
                return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
            } catch { return []; }
        }

        function addRecentSave(url, title, contentId) {
            const saves = loadRecentSaves();
            saves.unshift({ url: url, title: title || url, contentId: contentId, time: Date.now() });
            if (saves.length > MAX_RECENT) saves.length = MAX_RECENT;
            localStorage.setItem(RECENT_KEY, JSON.stringify(saves));
            renderRecentSaves();
        }

        function renderRecentSaves() {
            const saves = loadRecentSaves();
            const container = document.getElementById('recent-saves');
            const list = document.getElementById('recent-list');

            if (saves.length === 0) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            list.innerHTML = saves.map(function(s) {
                const ago = getTimeAgo(s.time);
                return '<li><a class="save-url" href="' + escapeHtml(s.url) + '" target="_blank">' + escapeHtml(s.title) + '</a><div class="save-time">' + ago + '</div></li>';
            }).join('');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getTimeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + 'm ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            const days = Math.floor(hours / 24);
            return days + 'd ago';
        }

        // --- Form handling ---
        function resetForm() {
            form.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = 'Save';
            hideStatus();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            showStatus('loading', 'Saving URL...');

            try {
                const formData = new FormData(form);
                const data = {
                    url: formData.get('url'),
                    title: formData.get('title') || null,
                    excerpt: formData.get('excerpt') || null,
                    source: 'web_save_page'
                };

                const response = await fetch(API_BASE + '/api/v1/content/save-url', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (response.ok) {
                    const contentId = Number(result.content_id);
                    const msg = result.duplicate
                        ? 'URL already saved (ID: ' + contentId + '). '
                        : 'Saved! Content ID: ' + contentId + '. Extraction in progress. ';

                    showStatusWithContent('success', function(el) {
                        el.appendChild(document.createTextNode(msg));
                        const link = document.createElement('a');
                        link.href = '#';
                        link.textContent = 'Save another';
                        link.addEventListener('click', function(ev) { ev.preventDefault(); resetForm(); });
                        el.appendChild(link);
                    });

                    submitBtn.textContent = 'Saved';
                    submitBtn.disabled = true;

                    // Track in recent saves
                    addRecentSave(data.url, data.title, result.content_id);
                } else {
                    throw new Error(result.detail || 'Save failed');
                }
            } catch (error) {
                showStatus('error', 'Error: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save';
            }
        });

        // Load recent saves on page load
        renderRecentSaves();
    </script>
</body>
</html>
