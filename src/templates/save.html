<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Save to Newsletter Aggregator</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --input-bg: #f5f5f5;
            --input-border: #e0e0e0;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #22c55e;
            --error-color: #ef4444;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #e5e5e5;
                --input-bg: #2a2a2a;
                --input-border: #404040;
                --primary-color: #6366f1;
                --primary-hover: #818cf8;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input[type="url"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            -webkit-appearance: none;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-height: 56px;
            -webkit-appearance: none;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-weight: 500;
        }

        .status.success {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .status.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        .status.loading {
            background-color: rgba(79, 70, 229, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .hidden {
            display: none;
        }

        .hint {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        @media (prefers-color-scheme: dark) {
            .hint {
                color: #999;
            }
        }
    </style>
</head>
<body>
    <h1>Save URL</h1>

    <form id="save-form">
        <div class="form-group">
            <label for="url">URL *</label>
            <input
                type="url"
                id="url"
                name="url"
                value="{{ url }}"
                placeholder="https://example.com/article"
                required
                autocomplete="off"
            >
        </div>

        <div class="form-group">
            <label for="title">Title</label>
            <input
                type="text"
                id="title"
                name="title"
                value="{{ title }}"
                placeholder="Article title (auto-extracted if empty)"
            >
            <p class="hint">Leave empty to extract from page</p>
        </div>

        <div class="form-group">
            <label for="excerpt">Excerpt / Notes</label>
            <textarea
                id="excerpt"
                name="excerpt"
                placeholder="Selected text or notes about this content"
            >{{ excerpt }}</textarea>
        </div>

        <button type="submit" id="submit-btn">Save</button>
    </form>

    <div id="status" class="status hidden"></div>

    <script>
        // API base URL injected from server (supports cross-origin bookmarklet use)
        const API_BASE = {{ api_base_url | tojson }};
        const form = document.getElementById('save-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusDiv = document.getElementById('status');

        function resetForm() {
            form.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = 'Save';
            statusDiv.classList.add('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            statusDiv.className = 'status loading';
            statusDiv.textContent = 'Saving URL...';
            statusDiv.classList.remove('hidden');

            try {
                const formData = new FormData(form);
                const data = {
                    url: formData.get('url'),
                    title: formData.get('title') || null,
                    excerpt: formData.get('excerpt') || null,
                    source: 'web_save_page'
                };

                const response = await fetch(API_BASE + '/api/v1/content/save-url', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.className = 'status success';
                    const contentId = Number(result.content_id);
                    const msg = result.duplicate
                        ? `URL already saved (ID: ${contentId}). `
                        : `Saved! Content ID: ${contentId}. Extraction in progress. `;
                    statusDiv.textContent = '';
                    statusDiv.appendChild(document.createTextNode(msg));
                    const link = document.createElement('a');
                    link.href = '#';
                    link.textContent = 'Save another';
                    link.addEventListener('click', (ev) => { ev.preventDefault(); resetForm(); });
                    statusDiv.appendChild(link);
                    submitBtn.textContent = 'Saved';
                    submitBtn.disabled = true;
                } else {
                    throw new Error(result.detail || 'Save failed');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `Error: ${error.message}`;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save';
            }
        });
    </script>
</body>
</html>
