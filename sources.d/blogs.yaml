defaults:
  type: blog
  enabled: true
  max_entries: 10
  request_delay: 1.0
  content_filter_strategy: keyword

sources:
  # Anthropic research blog — all posts are on-topic, no filter needed
  - name: "Anthropic Research"
    url: "https://www.anthropic.com/research"
    tags: [ai, anthropic, research]
    content_filter_strategy: none
    max_entries: 10

  # Claude blog — product announcements and guides
  - name: "Claude Blog"
    url: "https://www.anthropic.com/news"
    tags: [ai, claude, product]
    link_selector: "a[href*='/news/']"
    content_filter_strategy: none
    max_entries: 10

