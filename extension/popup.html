<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --input-bg: #f5f5f5;
      --input-border: #e0e0e0;
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --success-color: #22c55e;
      --error-color: #ef4444;
      --muted-color: #666;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1a1a1a;
        --text-color: #e5e5e5;
        --input-bg: #2a2a2a;
        --input-border: #404040;
        --primary-color: #6366f1;
        --primary-hover: #818cf8;
        --muted-color: #999;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      background-color: var(--bg-color);
      color: var(--text-color);
      width: 360px;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .form-group { margin-bottom: 12px; }

    label {
      display: block;
      font-weight: 500;
      font-size: 12px;
      margin-bottom: 4px;
      color: var(--muted-color);
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background-color: var(--input-bg);
      color: var(--text-color);
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
    }

    textarea {
      min-height: 60px;
      resize: vertical;
    }

    .url-display {
      font-size: 12px;
      color: var(--muted-color);
      word-break: break-all;
      margin-bottom: 12px;
      padding: 6px 8px;
      background-color: var(--input-bg);
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      background-color: var(--primary-color);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover { background-color: var(--primary-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      padding: 10px;
      border-radius: 6px;
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
    }

    .status.success {
      background-color: rgba(34, 197, 94, 0.1);
      color: var(--success-color);
      border: 1px solid var(--success-color);
    }

    .status.error {
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--error-color);
      border: 1px solid var(--error-color);
    }

    .status.loading {
      background-color: rgba(79, 70, 229, 0.1);
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
    }

    .hidden { display: none; }

    .config-warning {
      padding: 10px;
      border-radius: 6px;
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--error-color);
      border: 1px solid var(--error-color);
      font-size: 13px;
      text-align: center;
    }

    .config-warning a {
      color: var(--error-color);
      font-weight: 600;
    }

    .tags-hint {
      font-size: 11px;
      color: var(--muted-color);
      margin-top: 2px;
    }

    .capture-toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background-color: var(--input-bg);
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .capture-toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .capture-toggle-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-color);
      cursor: pointer;
    }

    .capture-status {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .capture-status.captured {
      background-color: rgba(34, 197, 94, 0.15);
      color: var(--success-color);
    }

    .capture-status.url-only {
      background-color: rgba(79, 70, 229, 0.1);
      color: var(--primary-color);
    }

    .capture-status.fallback {
      background-color: rgba(234, 179, 8, 0.15);
      color: #d97706;
    }
  </style>
</head>
<body>
  <h1>Save to Newsletter Aggregator</h1>

  <div id="config-warning" class="config-warning hidden">
    No API URL configured. <a href="#" id="open-options">Open settings</a>
  </div>

  <div id="save-form-container">
    <div class="url-display" id="page-url"></div>

    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="Page title (auto-detected)">
    </div>

    <div class="form-group">
      <label for="excerpt">Excerpt / Selected Text</label>
      <textarea id="excerpt" placeholder="Selected text or notes"></textarea>
    </div>

    <div class="form-group">
      <label for="tags">Tags</label>
      <input type="text" id="tags" placeholder="ai, technology, research">
      <div class="tags-hint">Comma-separated</div>
    </div>

    <div class="capture-toggle-group">
      <label class="capture-toggle-label">
        <input type="checkbox" id="capture-toggle" checked>
        <span>Capture full page</span>
      </label>
      <span id="capture-status" class="capture-status"></span>
    </div>

    <button id="save-btn">Save</button>
  </div>

  <div id="status" class="status hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
