<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Newsletter Aggregator - Extension Settings</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --input-bg: #f5f5f5;
      --input-border: #e0e0e0;
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --success-color: #22c55e;
      --error-color: #ef4444;
      --muted-color: #666;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1a1a1a;
        --text-color: #e5e5e5;
        --input-bg: #2a2a2a;
        --input-border: #404040;
        --primary-color: #6366f1;
        --primary-hover: #818cf8;
        --muted-color: #999;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 24px;
      max-width: 480px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted-color);
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted-color);
      margin-top: 2px;
    }

    input[type="text"],
    input[type="url"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background-color: var(--input-bg);
      color: var(--text-color);
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
    }

    button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      background-color: var(--primary-color);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover { background-color: var(--primary-hover); }

    .status {
      display: inline-block;
      margin-left: 12px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status.show { opacity: 1; }
    .status.success { color: var(--success-color); }
    .status.error { color: var(--error-color); }
  </style>
</head>
<body>
  <h1>Extension Settings</h1>
  <p class="subtitle">Configure connection to your Newsletter Aggregator instance.</p>

  <div class="form-group">
    <label for="api-url">API URL</label>
    <input
      type="url"
      id="api-url"
      placeholder="https://your-app.example.com"
      autocomplete="off"
    >
    <p class="hint">Base URL of your Newsletter Aggregator (no trailing slash)</p>
  </div>

  <div class="form-group">
    <label for="api-key">API Key (optional)</label>
    <input
      type="password"
      id="api-key"
      placeholder="Your API key or Supabase anon key"
      autocomplete="off"
    >
    <p class="hint">Leave empty if your instance doesn't require authentication</p>
  </div>

  <button id="save-btn">Save Settings</button>
  <span id="status" class="status"></span>

  <script src="options.js"></script>
</body>
</html>
