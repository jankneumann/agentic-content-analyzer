# Default model selection per pipeline step (using family-based IDs)
default_models:
  summarization: claude-haiku-4-5  # Fast, cheap for structured extraction
  theme_analysis: claude-sonnet-4-5  # Better reasoning for theme extraction
  digest_creation: claude-sonnet-4-5  # Balanced quality/cost for long-form
  digest_revision: claude-sonnet-4-5  # Quality-critical for conversational refinement
  historical_context: claude-sonnet-4-5  # Good at temporal reasoning
  youtube_processing: gemini-2.5-flash  # Native YouTube support, very cheap
  youtube_rss_processing: gemini-2.5-flash-lite  # Lightweight processing for RSS-sourced YouTube content
  caption_proofreading: gemini-2.5-flash-lite  # Fast, cheap for caption cleanup
  entity_extraction: claude-haiku-4-5  # Structured extraction, cost-effective
  reranking: gpt-5-nano  # Fast, cheap for simple ranking
  podcast_script: gemini-2.5-flash  # Conversational dialogue, tool use, high rate limits
  voice_cleanup: claude-haiku-4-5  # Fast, cheap for transcript polishing
  image_suggestion: claude-haiku-4-5  # Fast, cheap for image suggestion analysis
  cloud_stt: gemini-2.5-flash  # Native audio + built-in cleanup in one API call
  content_filtering: gemini-2.5-flash-lite  # Fast, cheap for relevance classification

# Routing Configuration
# Per-step routing mode: 'fixed' uses default_models above; 'dynamic' routes by complexity
# All steps default to fixed mode with routing disabled for safety
# Enable dynamic routing per-step after calibration proves quality parity
routing:
  summarization:
    mode: fixed
    enabled: false
    strong_model: claude-sonnet-4-5
    weak_model: claude-haiku-4-5
    threshold: 0.5
  theme_analysis:
    mode: fixed
    enabled: false
    strong_model: claude-sonnet-4-5
    weak_model: claude-haiku-4-5
    threshold: 0.5
  digest_creation:
    mode: fixed
    enabled: false
    strong_model: claude-sonnet-4-5
    weak_model: claude-haiku-4-5
    threshold: 0.5
  podcast_script:
    mode: fixed
    enabled: false
    strong_model: gemini-2.5-flash
    weak_model: gemini-2.5-flash-lite
    threshold: 0.5

# Notes on provider tiers and pricing:
# - Anthropic: Base pricing, direct API access
# - AWS Bedrock: ~15% markup, pay-as-you-go "on-demand" tier
# - Google Vertex AI: Similar to base, sometimes with enterprise discounts
# - Microsoft Azure: ~15% markup, requires Azure subscription
# - OpenAI: Base pricing for direct API
# - Google AI Studio: Free tier available, then standard pricing
#
# Pricing updated: December 2024
