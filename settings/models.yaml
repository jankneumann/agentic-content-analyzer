# Model Registry Configuration
# Updated: December 2024 (Refactored: Family-based model IDs)
#
# This file contains:
# 1. Model definitions (provider-agnostic capabilities, family-based IDs)
# 2. Provider-model configurations (provider-specific model IDs, pricing, limits)
#
# Update this file when:
# - New models are released
# - Pricing changes
# - Context windows are increased
# - New providers add support for existing models
#
# Key Changes (Dec 2024 Refactoring):
# - Model IDs are now family-based (e.g., "claude-sonnet-4-5" instead of "claude-sonnet-4-5-20250929")
# - Each model has a default_version field
# - Provider configs have provider_model_id field with the actual API identifier

# Model Definitions (provider-agnostic, family-based IDs)
models:
  # Claude 4.5 Family
  claude-haiku-4-5:
    family: claude
    name: "Claude 4.5 Haiku"
    supports_vision: true
    supports_video: false
    default_version: "20251001"

  claude-sonnet-4-5:
    family: claude
    name: "Claude 4.5 Sonnet"
    supports_vision: true
    supports_video: false
    default_version: "20250929"

  claude-opus-4-5:
    family: claude
    name: "Claude 4.5 Opus"
    supports_vision: true
    supports_video: false
    default_version: "20251024"

  # Legacy Claude
  claude-sonnet-4:
    family: claude
    name: "Claude Sonnet 4"
    supports_vision: true
    supports_video: false
    default_version: "20250514"

  # Gemini 3.0 Family
  gemini-3-flash:
    family: gemini
    name: "Gemini 3.0 Flash"
    supports_vision: true
    supports_video: true  # Native YouTube URL support
    supports_audio: true  # Native audio input for cloud STT
    default_version: "preview"

  gemini-3-pro:
    family: gemini
    name: "Gemini 3.0 Pro"
    supports_vision: true
    supports_video: true  # Native YouTube URL support
    supports_audio: true  # Native audio input for cloud STT
    default_version: "preview"

  gemini-2.5-flash:
    family: gemini
    name: "Gemini 2.5 Flash"
    supports_vision: true
    supports_video: true  # Native YouTube URL support
    supports_audio: true  # Native audio input for cloud STT
    default_version: ""

  gemini-2.5-flash-lite:
    family: gemini
    name: "Gemini 2.5 Flash Lite"
    supports_vision: true
    supports_video: true  # Native YouTube URL support
    supports_audio: true  # Native audio input for cloud STT
    default_version: ""

  gemini-2.0-flash:
    family: gemini
    name: "Gemini 2.0 Flash"
    supports_vision: true
    supports_video: true  # Native YouTube URL support
    supports_audio: true  # Native audio input for cloud STT
    default_version: ""

  # STT-specific models
  whisper-1:
    family: whisper
    name: "OpenAI Whisper"
    supports_vision: false
    supports_video: false
    supports_audio: true  # Audio transcription only
    default_version: ""

  deepgram-nova-3:
    family: deepgram
    name: "Deepgram Nova 3"
    supports_vision: false
    supports_video: false
    supports_audio: true  # Audio transcription only
    default_version: ""

  # OpenAI GPT-4o Family
  gpt-5.2:
    family: gpt
    name: "GPT-5.2"
    supports_vision: true
    supports_video: false
    default_version: "2025-12-11"

  gpt-5-mini:
    family: gpt
    name: "GPT-5 Mini"
    supports_vision: true
    supports_video: false
    default_version: "2025-08-07"

  gpt-5-nano:
    family: gpt
    name: "GPT-5 Nano"
    supports_vision: true
    supports_video: false
    default_version: "2025-08-07"

