# =============================================================================
# Opik Self-Hosted Stack — Local Development
# =============================================================================
#
# Run alongside the main docker-compose.yml without port conflicts:
#
#   docker compose up -d                                    # our stack
#   docker compose -f docker-compose.opik.yml -p opik up -d  # opik stack
#
# Or use Make targets (recommended):
#   make opik-up      # Start Opik stack with health check
#   make opik-down    # Stop Opik stack
#   make dev-opik     # Start API with Opik tracing enabled
#
# Then configure profile or .env:
#   export PROFILE=local-opik   # Uses profiles/local-opik.yaml
#
# Or manually in .env:
#   OBSERVABILITY_PROVIDER=opik
#   OTEL_ENABLED=true
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:5174/api/v1/private/otel
#
# UIs:
#   Opik:   http://localhost:5174  (port 5174 to avoid Vite conflict on 5173)
#   Jaeger: http://localhost:16686  (only with COMPOSE_PROFILES=otel)
#
# Tear down:
#   docker compose -f docker-compose.opik.yml -p opik down
#   # or: make opik-down
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infrastructure (no host ports — internal only)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4.2
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: opik
      MYSQL_DATABASE: opik
      MYSQL_USER: opik
      MYSQL_PASSWORD: opik
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      timeout: 1s
      interval: 1s
      retries: 300
    volumes:
      - opik_mysql:/var/lib/mysql

  redis:
    image: redis:7.2.4-alpine3.19
    hostname: redis
    command: redis-server --requirepass opik
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "6379"]
      interval: 2s
      timeout: 4s
      retries: 20
      start_period: 30s
    # NOTE: No host port mapping — avoids conflict with our Redis on 6379
    volumes:
      - opik_redis:/data

  zookeeper:
    image: zookeeper:3.9.4
    hostname: zookeeper
    user: root
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /bitnami/zookeeper/data
        chown -R zookeeper:zookeeper /bitnami/zookeeper
        exec gosu zookeeper /docker-entrypoint.sh zkServer.sh start-foreground
    environment:
      JVMFLAGS: "-Xmx512m"
      ZOO_4LW_COMMANDS_WHITELIST: "srvr,ruok"
      ZOO_DATA_DIR: /bitnami/zookeeper/data
      ZOO_DATA_LOG_DIR: /bitnami/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok"]
      interval: 1s
      timeout: 1s
      retries: 300
    volumes:
      - opik_zookeeper:/bitnami/zookeeper

  clickhouse-init:
    image: alpine:latest
    volumes:
      - ./opik/clickhouse_config:/clickhouse_config_files
      - opik_clickhouse_config:/config
    command: |
      sh -c "
        cp -r /clickhouse_config_files/* /config/ &&
        chown -R 1000:1000 /config
      "

  clickhouse:
    image: clickhouse/clickhouse-server:25.3.6.56-alpine
    hostname: clickhouse
    environment:
      CLICKHOUSE_DB: opik
      CLICKHOUSE_USER: opik
      CLICKHOUSE_PASSWORD: opik
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - opik_clickhouse_data:/var/lib/clickhouse
      - opik_clickhouse_logs:/var/log/clickhouse-server
      - opik_clickhouse_config:/etc/clickhouse-server/config.d
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 1s
      timeout: 1s
      retries: 300
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      zookeeper:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    hostname: minio
    environment:
      MINIO_ROOT_USER: THAAIOSFODNN7EXAMPLE
      MINIO_ROOT_PASSWORD: LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    command: server --console-address ":9090" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 1s
      timeout: 10s
      retries: 30
      start_period: 5s
    volumes:
      - opik_minio:/data

  mc:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10s;
      /usr/bin/mc alias set s3 http://minio:9000 THAAIOSFODNN7EXAMPLE LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY --api S3v4 ;
      /usr/bin/mc mb --ignore-existing s3/public;
      /usr/bin/mc anonymous set download s3/public/;
      "

  # ---------------------------------------------------------------------------
  # Opik Application (only frontend + backend exposed to host)
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/comet-ml/opik/opik-backend:${OPIK_VERSION:-latest}
    hostname: backend
    command: ["bash", "-c", "./run_db_migrations.sh && ./entrypoint.sh"]
    environment:
      STATE_DB_PROTOCOL: "jdbc:mysql://"
      STATE_DB_URL: "mysql:3306/opik?createDatabaseIfNotExist=true&rewriteBatchedStatements=true"
      STATE_DB_DATABASE_NAME: opik
      STATE_DB_USER: opik
      STATE_DB_PASS: opik
      ANALYTICS_DB_MIGRATIONS_URL: "jdbc:clickhouse://clickhouse:8123"
      ANALYTICS_DB_MIGRATIONS_USER: opik
      ANALYTICS_DB_MIGRATIONS_PASS: opik
      ANALYTICS_DB_PROTOCOL: "HTTP"
      ANALYTICS_DB_HOST: "clickhouse"
      ANALYTICS_DB_PORT: 8123
      ANALYTICS_DB_DATABASE_NAME: opik
      ANALYTICS_DB_USERNAME: opik
      ANALYTICS_DB_PASS: opik
      # Heap tuned for constrained memory: 1.2GB max heap within 2GB container limit
      JAVA_OPTS: "-Dliquibase.propertySubstitutionEnabled=true -XX:+UseG1GC -Xms512m -Xmx1200m"
      REDIS_URL: redis://:opik@redis:6379/
      OPIK_OTEL_SDK_ENABLED: false
      OPIK_USAGE_REPORT_ENABLED: "false"
      AWS_ACCESS_KEY_ID: THAAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: LESlrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      IS_MINIO: "true"
      S3_URL: http://minio:9000
      PYTHON_EVALUATOR_URL: http://python-backend:8000
      CORS: "false"
    ports:
      - "8080:8080"   # Opik API
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health-check"]
      interval: 1s
      timeout: 600s
      retries: 600
      start_period: 1s
    depends_on:
      mysql:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  python-backend:
    image: ghcr.io/comet-ml/opik/opik-python-backend:${OPIK_VERSION:-latest}
    hostname: python-backend
    privileged: true
    environment:
      OPIK_OTEL_SDK_ENABLED: "false"
      PYTHON_CODE_EXECUTOR_STRATEGY: process
      PYTHON_CODE_EXECUTOR_EXEC_TIMEOUT_IN_SECS: 3
      PYTHON_BACKEND_PORT: 8000
      OPIK_REVERSE_PROXY_URL: http://frontend:5174/api
      OPIK_URL_OVERRIDE: http://backend:8080
      REDIS_URL: redis://:opik@redis:6379/0
      RQ_WORKER_ENABLED: "true"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --spider --quiet http://127.0.0.1:8000/healthcheck || exit 0"]
      interval: 2s
      timeout: 60s
      retries: 30
      start_period: 2s
    # NOTE: No host port mapping — avoids conflict with our FastAPI on 8000
    tmpfs:
      - /var/lib/docker

  frontend:
    image: ghcr.io/comet-ml/opik/opik-frontend:${OPIK_VERSION:-latest}
    hostname: frontend
    ports:
      - "5174:5174"    # Opik UI (port 5174 to avoid conflict with Vite on 5173)
    volumes:
      - ./opik/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --fail-early http://localhost:5174/health"]
      interval: 1s
      timeout: 30s
      retries: 10
      start_period: 1s
    environment:
      NGINX_PORT: 5174
      OTEL_TRACE: "off"

  # ---------------------------------------------------------------------------
  # Optional: OTel Collector + Jaeger (for trace debugging)
  #
  # Start with:  docker compose -f docker-compose.opik.yml -p opik --profile otel up -d
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles:
      - otel
    hostname: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 5s
      timeout: 5s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.139.0
    profiles:
      - otel
    hostname: otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./opik/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol-contrib/config.yaml"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    depends_on:
      jaeger:
        condition: service_healthy

volumes:
  opik_mysql:
  opik_redis:
  opik_zookeeper:
  opik_clickhouse_data:
  opik_clickhouse_logs:
  opik_clickhouse_config:
  opik_minio:
